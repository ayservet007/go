<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Opening Maps...</title></head>
<body>
<script>
var ua = navigator.userAgent;
if (/iPhone|iPad|iPod|Macintosh/.test(ua) && 'ontouchend' in document) {
  // iOS / iPadOS — Apple Maps
  location.href = "maps://";
  setTimeout(function(){ location.href = "https://maps.google.com"; }, 800);
} else if (/Android/.test(ua)) {
  location.href = "intent://maps.google.com#Intent;scheme=https;package=com.google.android.apps.maps;end";
  setTimeout(function(){ location.href = "https://maps.google.com"; }, 800);
} else {
  location.href = "https://maps.google.com";
}
</script>
<noscript><meta http-equiv="refresh" content="0;url=https://maps.google.com"></noscript>
</body>
</html>
