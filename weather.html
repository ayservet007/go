<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Opening Weather...</title></head>
<body>
<script>
var ua = navigator.userAgent;
if (/iPhone|iPad|iPod/.test(ua)) {
  location.href = "weather://";
  setTimeout(function(){ location.href = "https://weather.com"; }, 800);
} else if (/Android/.test(ua)) {
  location.href = "intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.DEFAULT;package=com.google.android.apps.weather;end";
  setTimeout(function(){ location.href = "https://weather.com"; }, 800);
} else {
  location.href = "https://weather.com";
}
</script>
<noscript><meta http-equiv="refresh" content="0;url=https://weather.com"></noscript>
</body>
</html>
